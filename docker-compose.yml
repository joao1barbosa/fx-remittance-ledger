services:
  postgres:
    image: postgres:17-alpine
    container_name: fx-remittance-pg
    environment:
      POSTGRES_DB: fx_remittance
      POSTGRES_USER: fx_remittance
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fx_remittance -d fx_remittance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
